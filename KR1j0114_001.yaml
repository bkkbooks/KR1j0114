body:
  text: 證俗音今謂女嫁後三日餉食為餪女南方謂凝牛羊鹿血為䘓以虀噉之消酒炙去毛為燂𪍴𪍣內國呼為環亦餅呼寒具今江南呼饊飯己煎米以糖餅之者為麩𥹷也音浮流葖蘆蔔蕪菁屬紫花大根俗呼為雹葖氍毛席也赨蛇肉食之辟蠱毒蝘蜓山東謂之𧋐𧐎音七錫名敵反陜以西謂之壁宮蝤蛑大蟹也音在侯莫侯二反有毛者曰蟛蜞無毛者為彭螖堪食俗呼彭越訛耳鰿吳人呼為鯽魚並北戶録注
